/* ═══════════════════════════════════════════
   NOTIFICATION TOAST
═══════════════════════════════════════════ */
let toastFn=null;
function Toast(){
  const[toasts,setToasts]=useState([]);
  toastFn=(msg,type='success')=>{
    const id=Date.now();
    setToasts(p=>[...p,{id,msg,type}]);
    setTimeout(()=>setToasts(p=>p.filter(t=>t.id!==id)),3500);
  };
  const colors={success:'#10B981',error:'#EF4444',info:'#6C3BFF',warning:'#F59E0B'};
  return(
    <div style={{position:'fixed',top:80,right:16,zIndex:9999,display:'flex',flexDirection:'column',gap:8}}>
      {toasts.map(t=>(
        <div key={t.id} style={{background:'#0D1428',border:`1px solid ${colors[t.type]}55`,borderRadius:12,padding:'12px 16px',
          maxWidth:280,boxShadow:`0 4px 24px ${colors[t.type]}33`,
          animation:'notifSlide 0.3s ease',display:'flex',alignItems:'center',gap:10}}>
          <span style={{width:8,height:8,borderRadius:'50%',background:colors[t.type],flexShrink:0,boxShadow:`0 0 8px ${colors[t.type]}`}}/>
          <span style={{color:'#ECF0FF',fontSize:13}}>{t.msg}</span>
        </div>
      ))}
    </div>
  );
}
function toast(m,t){if(toastFn)toastFn(m,t);}

  const latMin=23.5,latMax=37.8,lngMin=60,lngMax=77.8;

  }
  const cityDots=[
    {n:'Abbottabad',lat:34.148,lng:73.199,cov:true},{n:'Islamabad',lat:33.684,lng:73.048,cov:true},
    {n:'Rawalpindi',lat:33.565,lng:73.017,cov:true},{n:'Peshawar',lat:34.015,lng:71.525,cov:true},

  const shown=services.filter(s=>!activeCat||s.cat===activeCat);
  const[hov,setHov]=useState(null);
  return(
    <div style={{background:'#07091A',borderRadius:20,overflow:'hidden',border:'1px solid #1A1F40',position:'relative'}}>
      <div style={{position:'absolute',inset:0,background:'radial-gradient(ellipse at 40% 35%, #5B3FFF0A 0%, transparent 60%)',pointerEvents:'none'}}/>
      <div style={{padding:'12px 16px 8px',display:'flex',gap:8,flexWrap:'wrap'}}>
        {CATS.map(c=>(
          <span key={c.id} style={{fontSize:9,color:'#4A5080',display:'flex',alignItems:'center',gap:3,fontWeight:600,letterSpacing:0.5}}>
            <span style={{width:7,height:7,borderRadius:'50%',background:c.color,display:'inline-block',boxShadow:`0 0 5px ${c.color}`}}/>
            {c.label.toUpperCase()}
          </span>
        ))}
      </div>
      <svg width='100%' viewBox={`0 0 ${W} ${H}`} style={{display:'block'}}>
        <defs>
          <radialGradient id='mg' cx='40%' cy='35%' r='55%'>
            <stop offset='0%' stopColor='#5B3FFF' stopOpacity='0.1'/>
            <stop offset='100%' stopColor='transparent'/>
          </radialGradient>
          <filter id='gf'><feGaussianBlur stdDeviation='2'/></filter>
          <filter id='pf'><feGaussianBlur stdDeviation='1.5' result='b'/><feMerge><feMergeNode in='b'/><feMergeNode in='SourceGraphic'/></feMerge></filter>
        </defs>
        <rect width={W} height={H} fill='#05071A'/>
        <rect width={W} height={H} fill='url(#mg)'/>
        <path d={pkPath} fill='#0C1435' stroke='#2A3E9A' strokeWidth='2' strokeLinejoin='round'/>

          return(

          );
        })}
      </svg>
    </div>
  );
}

function AuthModal({initMode,onSuccess,onClose}){
  const[mode,setMode]=useState(initMode||'login');
  const[name,setName]=useState('');
  const[email,setEmail]=useState('');
  const[pw,setPw]=useState('');
  const[phone,setPhone]=useState('');
  const[err,setErr]=useState('');
  const[loading,setLoading]=useState(false);
  const[showPw,setShowPw]=useState(false);

  const iStyle={width:'100%',background:'#07091A',border:'1px solid #1A2040',borderRadius:10,
    padding:'11px 14px',color:'#ECF0FF',fontSize:13,transition:'border-color 0.2s'};

  function login(){
    setErr('');setLoading(true);
    setTimeout(()=>{
      const users=DB.get('users')||[];
      const u=users.find(x=>x.email===email&&x.password===pw);
      if(u){DB.set('session',u);onSuccess(u);toast(`Welcome back, ${u.name}! 👋`,'success');}
      else setErr('Incorrect email or password');
      setLoading(false);
    },700);
  }
  function register(){
    setErr('');
    if(!name||!email||!pw||!phone){setErr('All fields are required');return;}
    if(pw.length<6){setErr('Password must be at least 6 characters');return;}
    if(!email.includes('@')){setErr('Enter a valid email');return;}
    const users=DB.get('users')||[];
    if(users.find(x=>x.email===email)){setErr('This email is already registered');return;}
    setLoading(true);
    setTimeout(()=>{
      const u={id:'u'+Date.now(),name,email,password:pw,phone,role:'user',avatar:'👤',
        joined:new Date().toISOString().split('T')[0],verified:false};
      DB.set('users',[...users,u]);
      DB.set('session',u);
      onSuccess(u);
      toast(`Welcome to ShahBaaz, ${u.name}! 🎉`,'success');
      setLoading(false);
    },700);
  }
  function handleKey(e){if(e.key==='Enter'){mode==='login'?login():register();}}

  return(
    <div style={{position:'fixed',inset:0,background:'#000000F0',zIndex:4000,display:'flex',
      alignItems:'center',justifyContent:'center',padding:16,backdropFilter:'blur(14px)',animation:'fadeIn 0.2s ease'}}>
      <div style={{background:'#090B1C',border:'1px solid #5B3FFF44',borderRadius:24,
        width:'100%',maxWidth:380,overflow:'hidden',animation:'zoomIn 0.3s ease',position:'relative'}}>
        <div style={{height:3,background:'linear-gradient(90deg,#5B3FFF,#38BDF8,#10B981)',backgroundSize:'300%',animation:'gradientFlow 3s ease infinite'}}/>
        <div style={{padding:'28px 26px 24px'}}>
          <div style={{textAlign:'center',marginBottom:22}}>
            <div style={{fontSize:46,display:'inline-block',animation:'floatUp 2.5s ease-in-out infinite',
              filter:'drop-shadow(0 0 16px #5B3FFF88)'}}>🦅</div>
            <h2 style={{fontFamily:"'Plus Jakarta Sans',sans-serif",fontWeight:800,fontSize:20,
              margin:'10px 0 4px',background:'linear-gradient(90deg,#A78BFA,#38BDF8)',
              WebkitBackgroundClip:'text',WebkitTextFillColor:'transparent'}}>
              {mode==='login'?'Welcome Back!':'Create Account'}
            </h2>
            <p style={{color:'#2A3560',fontSize:11,fontWeight:500}}>ShahBaaz · Abbottabad's Super App</p>
          </div>
          <div style={{display:'flex',background:'#07091A',borderRadius:12,padding:3,marginBottom:20,border:'1px solid #1A2040'}}>
            {[['login','Sign In'],['register','Sign Up']].map(([m,l])=>(
              <button key={m} onClick={()=>{setMode(m);setErr('');}}
                style={{flex:1,background:mode===m?'linear-gradient(135deg,#5B3FFF,#4030CC)':'transparent',
                  border:'none',borderRadius:10,padding:'9px',color:mode===m?'#fff':'#2A3560',
                  cursor:'pointer',fontSize:12,fontWeight:700,transition:'all 0.2s'}}>{l}</button>
            ))}
          </div>
          {mode==='register'&&(
            <div style={{marginBottom:11}}>
              <label style={{color:'#4A5580',fontSize:10.5,display:'block',marginBottom:3,fontWeight:600}}>Full Name</label>
              <input type='text' placeholder='Muhammad Ali' value={name} onChange={e=>setName(e.target.value)} onKeyDown={handleKey}
                style={iStyle} onFocus={e=>e.target.style.borderColor='#5B3FFF'} onBlur={e=>e.target.style.borderColor='#1A2040'}/>
            </div>
          )}
          <div style={{marginBottom:11}}>
            <label style={{color:'#4A5580',fontSize:10.5,display:'block',marginBottom:3,fontWeight:600}}>Email Address</label>
            <input type='email' placeholder='you@example.com' value={email} onChange={e=>setEmail(e.target.value)} onKeyDown={handleKey}
              style={iStyle} onFocus={e=>e.target.style.borderColor='#5B3FFF'} onBlur={e=>e.target.style.borderColor='#1A2040'}/>
          </div>
          <div style={{marginBottom:11}}>
            <label style={{color:'#4A5580',fontSize:10.5,display:'block',marginBottom:3,fontWeight:600}}>Password</label>
            <div style={{position:'relative'}}>
              <input type={showPw?'text':'password'} placeholder='••••••••' value={pw} onChange={e=>setPw(e.target.value)} onKeyDown={handleKey}
                style={{...iStyle,paddingRight:40}} onFocus={e=>e.target.style.borderColor='#5B3FFF'} onBlur={e=>e.target.style.borderColor='#1A2040'}/>
              <button onClick={()=>setShowPw(!showPw)} style={{position:'absolute',right:12,top:'50%',transform:'translateY(-50%)',
                background:'none',border:'none',color:'#2A3560',cursor:'pointer',fontSize:14}}>{showPw?'🙈':'👁️'}</button>
            </div>
          </div>
          {mode==='register'&&(
            <div style={{marginBottom:11}}>
              <label style={{color:'#4A5580',fontSize:10.5,display:'block',marginBottom:3,fontWeight:600}}>Phone Number</label>
              <input type='tel' placeholder='0300-1234567' value={phone} onChange={e=>setPhone(e.target.value)} onKeyDown={handleKey}
                style={iStyle} onFocus={e=>e.target.style.borderColor='#5B3FFF'} onBlur={e=>e.target.style.borderColor='#1A2040'}/>
            </div>
          )}
          {err&&<div style={{background:'#EF444418',border:'1px solid #EF444440',borderRadius:8,
            padding:'8px 12px',color:'#EF4444',fontSize:11.5,marginBottom:12,animation:'fadeUp 0.2s ease'}}>⚠️ {err}</div>}
          <button onClick={mode==='login'?login:register} disabled={loading}
            style={{width:'100%',background:loading?'#1A2040':'linear-gradient(135deg,#5B3FFF,#4030CC)',
              border:'none',borderRadius:12,padding:'13px',color:'#fff',fontWeight:700,
              cursor:loading?'not-allowed':'pointer',fontSize:14,marginBottom:12,
              boxShadow:loading?'none':'0 4px 22px #5B3FFF44',transition:'all 0.2s'}}
            onMouseEnter={e=>{if(!loading){e.currentTarget.style.transform='scale(1.02)';e.currentTarget.style.boxShadow='0 6px 28px #5B3FFF66'}}}
            onMouseLeave={e=>{e.currentTarget.style.transform='scale(1)';e.currentTarget.style.boxShadow='0 4px 22px #5B3FFF44'}}>
            {loading?'⏳ Please wait...':(mode==='login'?'Sign In →':'Create My Account →')}
          </button>
          {mode==='login'&&(
            <div style={{background:'#07091A',borderRadius:10,padding:'10px 14px',fontSize:10.5,color:'#2A3560',border:'1px solid #1A2040',marginBottom:10}}>
              <p style={{margin:'0 0 3px',fontWeight:700,color:'#3A4580'}}>Demo Accounts:</p>
              <p style={{margin:'1px 0'}}>👑 Admin: ashhad@shahbaaz.pk / admin123</p>
              <p style={{margin:'1px 0'}}>👤 User: ali@test.pk / pass123</p>
            </div>
          )}
          <button onClick={onClose} style={{width:'100%',background:'none',border:'none',color:'#1A2040',fontSize:11,cursor:'pointer',padding:'6px'}}>Continue without account</button>
        </div>
      </div>
    </div>
  );
}

      </div>
    </div>
  );
}

function AdminPanel({onUpdate,onClose,user}){
  const[tab,setTab]=useState('services');
  const[msg,setMsg]=useState('');
  const svcs=DB.get('services')||[];
  const users=DB.get('users')||[];
  const bookings=DB.get('bookings')||[];

  function delService(id){DB.set('services',svcs.filter(s=>s.id!==id));setMsg('Removed');onUpdate();setTimeout(()=>setMsg(''),2000);}
  function toggleVerify(id){DB.set('services',svcs.map(s=>s.id===id?{...s,verified:!s.verified}:s));setMsg('Updated');onUpdate();setTimeout(()=>setMsg(''),2000);}

  const tabBtn=(id,label)=>(
    <button key={id} onClick={()=>setTab(id)} style={{background:tab===id?'#5B3FFF22':'#07091A',
      border:`1px solid ${tab===id?'#5B3FFF':'#1A2040'}`,borderRadius:8,padding:'6px 14px',
      color:tab===id?'#A78BFA':'#2A3560',cursor:'pointer',fontSize:11,fontWeight:600,textTransform:'capitalize'}}>
      {label}
    </button>
  );

  return(
    <div style={{position:'fixed',inset:0,background:'#000000EE',zIndex:3000,display:'flex',
      alignItems:'center',justifyContent:'center',padding:16,backdropFilter:'blur(12px)'}}>
      <div style={{background:'#090B1C',border:'1px solid #5B3FFF55',borderRadius:22,width:'100%',
        maxWidth:800,maxHeight:'90vh',overflowY:'auto',animation:'zoomIn 0.3s ease'}}>
        <div style={{padding:'18px 22px',borderBottom:'1px solid #1A2040',display:'flex',
          justifyContent:'space-between',alignItems:'center',position:'sticky',top:0,background:'#090B1C',zIndex:1}}>
          <div>
            <h2 style={{color:'#A78BFA',margin:0,fontSize:17,fontWeight:800}}>⚙️ Admin Dashboard</h2>
            <p style={{color:'#1A2040',margin:'2px 0 0',fontSize:10}}>Logged as {user?.name} · ShahBaaz Admin</p>
          </div>
          <button onClick={onClose} style={{background:'#EF444418',border:'1px solid #EF444440',borderRadius:8,padding:'6px 12px',color:'#EF4444',cursor:'pointer',fontSize:11}}>✕ Close</button>
        </div>
        <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:10,padding:'14px 22px',borderBottom:'1px solid #1A2040'}}>
          {[['Services',svcs.length,'#5B3FFF','🛎️'],['Users',users.length,'#10B981','👥'],['Bookings',bookings.length,'#F59E0B','📋'],['Revenue','Free','#EC4899','💰']].map(([l,n,c,ic])=>(
            <div key={l} style={{background:'#07091A',borderRadius:12,padding:'12px 10px',textAlign:'center',border:`1px solid ${c}22`}}>
              <div style={{fontSize:20,marginBottom:4}}>{ic}</div>
              <div style={{color:c,fontSize:18,fontWeight:800}}>{n}</div>
              <div style={{color:'#2A3560',fontSize:10,fontWeight:600}}>{l}</div>
            </div>
          ))}
        </div>
        <div style={{padding:'12px 22px',display:'flex',gap:6,borderBottom:'1px solid #1A2040'}}>
          {tabBtn('services','Services ('+svcs.length+')')}
          {tabBtn('users','Users ('+users.length+')')}
          {tabBtn('bookings','Bookings ('+bookings.length+')')}
        </div>
        {msg&&<div style={{margin:'10px 22px',padding:'8px 14px',background:'#10B98118',border:'1px solid #10B98140',borderRadius:8,color:'#10B981',fontSize:11}}>✓ {msg}</div>}
        <div style={{padding:'14px 22px'}}>
          {tab==='services'&&svcs.map(s=>(
            <div key={s.id} style={{background:'#07091A',border:'1px solid #1A2040',borderRadius:12,
              padding:'10px 14px',display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:8,gap:10}}>
              <div style={{flex:1,minWidth:0}}>
                <p style={{color:'#ECF0FF',margin:0,fontSize:12.5,fontWeight:600}}>{s.icon} {s.name}</p>
                <p style={{color:'#1A2040',margin:'2px 0 0',fontSize:10}}>📍 {s.city} · {s.cat} · {s.lat},{s.lng}</p>
              </div>
              <div style={{display:'flex',gap:6,flexShrink:0}}>
                <button onClick={()=>toggleVerify(s.id)} style={{background:s.verified?'#10B98115':'#1A2040',
                  border:`1px solid ${s.verified?'#10B98140':'#2A3060'}`,borderRadius:7,padding:'4px 9px',
                  color:s.verified?'#10B981':'#2A3560',cursor:'pointer',fontSize:10}}>
                  {s.verified?'✓ Verified':'Verify'}
                </button>
                <button onClick={()=>delService(s.id)} style={{background:'#EF444415',border:'1px solid #EF444435',
                  borderRadius:7,padding:'4px 9px',color:'#EF4444',cursor:'pointer',fontSize:10}}>🗑️</button>
              </div>
            </div>
          ))}
          {tab==='users'&&users.map(u=>(
            <div key={u.id} style={{background:'#07091A',border:'1px solid #1A2040',borderRadius:12,
              padding:'10px 14px',display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:8}}>
              <div>
                <p style={{color:'#ECF0FF',margin:0,fontSize:12.5,fontWeight:600}}>{u.avatar} {u.name}</p>
                <p style={{color:'#1A2040',margin:'2px 0 0',fontSize:10}}>{u.email} · {u.phone} · joined {u.joined}</p>
              </div>
              <span style={{background:u.role==='admin'?'#F59E0B18':'#5B3FFF18',color:u.role==='admin'?'#F59E0B':'#A78BFA',
                border:`1px solid ${u.role==='admin'?'#F59E0B33':'#5B3FFF33'}`,borderRadius:20,padding:'2px 9px',fontSize:10,fontWeight:700}}>
                {u.role}
              </span>
            </div>
          ))}
          {tab==='bookings'&&(bookings.length===0
            ?<p style={{color:'#1A2040',textAlign:'center',padding:'30px 0',fontSize:13}}>No bookings yet</p>
            :bookings.map(b=>(
              <div key={b.id} style={{background:'#07091A',border:'1px solid #1A2040',borderRadius:12,padding:'10px 14px',marginBottom:8}}>
                <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
                  <p style={{color:'#ECF0FF',margin:0,fontSize:12.5,fontWeight:600}}>{b.serviceIcon} {b.serviceName}</p>
                  <span style={{background:'#F59E0B18',color:'#F59E0B',border:'1px solid #F59E0B33',
                    borderRadius:20,padding:'2px 9px',fontSize:10,fontFamily:'monospace',fontWeight:700,letterSpacing:1}}>{b.code}</span>
                </div>
                <p style={{color:'#1A2040',margin:'3px 0 0',fontSize:10}}>👤 {b.userName} · 📞 {b.phone}{b.date?` · 📅 ${b.date}`:''} · {new Date(b.createdAt).toLocaleDateString()}</p>
              </div>
            ))
          )}
        </div>
      </div>
    </div>
  );
}

  const[page,setPage]=useState('home');
  const[activeCat,setActiveCat]=useState(null);
  const[q,setQ]=useState('');
  const[cityF,setCityF]=useState('All');
  const[showMap,setShowMap]=useState(false);
  const[selPin,setSelPin]=useState(null);
  const[booking,setBooking]=useState(null);
  const[showAdd,setShowAdd]=useState(false);
  const[showAdmin,setShowAdmin]=useState(false);
  const[showAuth,setShowAuth]=useState(false);
  const[authMode,setAuthMode]=useState('login');
  const[mobileMenu,setMobileMenu]=useState(false);
  const[tick,setTick]=useState(0);

  useEffect(()=>{
    initDB();
    const sess=DB.get('session');
    if(sess)setUser(sess);
    refresh();
    setTimeout(()=>setSplash(false),2800);
  },[]);

  function refresh(){setServices(DB.get('services')||[]);setTick(t=>t+1);}

  const filtered=useMemo(()=>{
    return services.filter(s=>{
      if(activeCat&&s.cat!==activeCat)return false;
      if(q){const lq=q.toLowerCase();if(![s.name,s.city,s.tag,s.desc,s.address].some(v=>v&&v.toLowerCase().includes(lq)))return false;}
      if(cityF!=='All'&&s.city!==cityF)return false;
      return true;
    });
  },[services,activeCat,q,cityF,tick]);

  const allCities=useMemo(()=>['All',...new Set(services.map(s=>s.city))]   ,[services]);

  function logout(){DB.set('session',null);setUser(null);toast('Signed out successfully','info');}

  /* SPLASH */

      alignItems:'center',justifyContent:'center',overflow:'hidden',position:'relative'}}>
      <div style={{position:'absolute',inset:0}}>
        {[...Array(20)].map((_,i)=>(

            left:`${Math.random()*100}%`,top:`${Math.random()*100}%`,
            width:Math.random()*3+1,height:Math.random()*3+1,
            borderRadius:'50%',background:'#5B3FFF',opacity:Math.random()*0.5+0.1,
            animation:`floatUp ${2+Math.random()*3}s ease-in-out ${Math.random()*2}s infinite`}}/>

      </div>

        <div style={{fontSize:80,display:'inline-block',filter:'drop-shadow(0 0 30px #5B3FFF)',
          animation:'floatUp 2.5s ease-in-out infinite'}}>🦅</div>
        <h1 className='hero-title' style={{display:'block',marginTop:16}}>SHAHBAAZ</h1>
        <p style={{color:'#2A3560',letterSpacing:6,fontSize:10,textTransform:'uppercase',
          fontFamily:"'Plus Jakarta Sans',sans-serif",fontWeight:600,marginTop:8}}>
          ABBOTTABAD'S SUPER APP
        </p>
        <div style={{marginTop:24,display:'flex',gap:10,justifyContent:'center'}}>
          {CATS.map((c,i)=>(
            <span key={c.id} style={{fontSize:18,display:'inline-block',
              animation:`floatUp ${1.8+i*0.2}s ease-in-out ${i*0.12}s infinite`,opacity:0.6,
              filter:`drop-shadow(0 0 6px ${c.color})`}}>{c.icon}</span>
          ))}
        </div>
      </div>
    </div>
  );

  return(
    <div style={{minHeight:'100vh',background:'#02040A'}}>
      <Toast/>
      {/* BG EFFECTS */}
      <div style={{position:'fixed',inset:0,pointerEvents:'none',zIndex:0,
        background:'radial-gradient(ellipse at 15% 5%, #5B3FFF08 0%, transparent 45%), radial-gradient(ellipse at 85% 85%, #38BDF808 0%, transparent 45%)'}}/>

      {/* HEADER */}

        padding:'0 20px',position:'sticky',top:0,zIndex:200,backdropFilter:'blur(16px)'}}>

              <div style={{display:'flex',gap:6}}>
                <button onClick={()=>{setAuthMode('login');setShowAuth(true);}} style={{background:'#0F1328',
                  border:'1px solid #1A2040',borderRadius:10,padding:'7px 13px',color:'#4A5580',cursor:'pointer',fontSize:11,fontWeight:600}}>
                  Sign In
                </button>
                <button onClick={()=>{setAuthMode('register');setShowAuth(true);}} style={{
                  background:'linear-gradient(135deg,#5B3FFF,#4030CC)',border:'none',borderRadius:10,
                  padding:'7px 14px',color:'#fff',cursor:'pointer',fontSize:11,fontWeight:700,
                  boxShadow:'0 0 16px #5B3FFF44',animation:'pulseGlow 3s ease-in-out infinite'}}>
                  Sign Up Free
                </button>
              </div>
            )}
          </nav>
        </div>
      </header>

      {/* HERO SECTION */}
      {page==='home'&&(
        <section style={{background:'linear-gradient(180deg,#080B1C 0%,#02040A 100%)',
          padding:'52px 20px 36px',textAlign:'center',borderBottom:'1px solid #0F1328',
          position:'relative',overflow:'hidden'}}>
          {/* floating bg icons */}
          {[['🚗','8%','15%',3],['🍽️','90%','20%',3.5],['🏠','5%','70%',4],['🩺','92%','65%',3.2],['📚','15%','85%',3.8],['🔧','80%','80%',4.2]].map(([ic,l,t,d])=>(
            <div key={ic} style={{position:'absolute',left:l,top:t,fontSize:28,opacity:0.08,
              animation:`floatUp ${d}s ease-in-out infinite`,pointerEvents:'none'}}>{ic}</div>
          ))}
          <div style={{maxWidth:720,margin:'0 auto',position:'relative',zIndex:1}}>
            <div style={{display:'inline-block',background:'linear-gradient(135deg,#5B3FFF22,#38BDF822)',
              border:'1px solid #5B3FFF44',borderRadius:20,padding:'5px 16px',fontSize:10.5,
              color:'#A78BFA',marginBottom:18,fontWeight:700,letterSpacing:1.5,
              animation:'fadeUp 0.5s ease'}}>
              ✦ ABBOTTABAD'S MOST POWERFUL LOCAL APP
            </div>
            <h1 className='hero-title' style={{display:'block',marginBottom:14,animation:'fadeUp 0.5s 0.1s ease both'}}>
              FIND IT ALL.<br/>BOOK IT NOW.
            </h1>
            <p style={{color:'#4A5580',fontSize:15,marginBottom:28,lineHeight:1.6,fontWeight:500,animation:'fadeUp 0.5s 0.2s ease both'}}>
              Rides · Food · Houses · Doctors · Technicians · Tutors · Shops<br/>
              <span style={{color:'#2A3560',fontSize:13}}>All in one place. Verified. Secure. 100% Free.</span>
            </p>
            {/* SEARCH BAR */}
            <div style={{display:'flex',gap:8,maxWidth:580,margin:'0 auto 22px',animation:'fadeUp 0.5s 0.3s ease both'}}>
              <div style={{flex:1,position:'relative'}}>
                <span style={{position:'absolute',left:13,top:'50%',transform:'translateY(-50%)',fontSize:15,pointerEvents:'none',opacity:0.5}}>🔍</span>
                <input value={q} onChange={e=>setQ(e.target.value)}
                  placeholder='Search services, doctors, food, rides...'
                  style={{width:'100%',background:'#0A0D1E',border:'1px solid #1A2040',borderRadius:14,
                    padding:'13px 14px 13px 38px',color:'#ECF0FF',fontSize:13,transition:'border-color 0.2s',
                    boxShadow:'0 4px 24px #00000088'}}
                  onFocus={e=>e.target.style.borderColor='#5B3FFF'} onBlur={e=>e.target.style.borderColor='#1A2040'}/>
              </div>
              <select value={cityF} onChange={e=>setCityF(e.target.value)}
                style={{background:'#0A0D1E',border:'1px solid #1A2040',borderRadius:14,padding:'13px 12px',
                  color:'#4A5580',fontSize:12,cursor:'pointer',minWidth:130,boxShadow:'0 4px 24px #00000088'}}
                onFocus={e=>e.target.style.borderColor='#5B3FFF'} onBlur={e=>e.target.style.borderColor='#1A2040'}>
                {allCities.map(c=><option key={c}>{c}</option>)}
              </select>
            </div>
            {/* STATS */}
            <div style={{display:'flex',gap:24,justifyContent:'center',flexWrap:'wrap',animation:'fadeUp 0.5s 0.4s ease both'}}>
              {[[services.length+'+','Live Services'],['7','Cities Covered'],['100%','Free to Use'],['🛡️','Anti-Scam']].map(([n,l])=>(
                <div key={l} style={{textAlign:'center'}}>
                  <div style={{color:'#A78BFA',fontSize:18,fontWeight:800,fontFamily:"'Bebas Neue',sans-serif",letterSpacing:1}}>{n}</div>
                  <div style={{color:'#1A2040',fontSize:10,fontWeight:600,letterSpacing:0.5}}>{l}</div>
                </div>
              ))}
            </div>
          </div>
        </section>
      )}

      {/* CATEGORY PILLS */}
      <div style={{background:'#04060F',borderBottom:'1px solid #0F1328',padding:'0 20px',
        position:'sticky',top:60,zIndex:150,backdropFilter:'blur(10px)'}}>
        <div style={{maxWidth:1240,margin:'0 auto',display:'flex',gap:6,overflowX:'auto',padding:'10px 0',
          scrollbarWidth:'none'}}>
          <button onClick={()=>setActiveCat(null)} style={{
            background:!activeCat?'linear-gradient(135deg,#5B3FFF22,#5B3FFF0A)':'#07091A',
            border:`1.5px solid ${!activeCat?'#5B3FFF':'#1A2040'}`,
            borderRadius:12,padding:'8px 16px',color:!activeCat?'#A78BFA':'#2A3560',
            cursor:'pointer',fontSize:11.5,fontWeight:700,whiteSpace:'nowrap',transition:'all 0.2s',flexShrink:0,
            boxShadow:!activeCat?'0 0 16px #5B3FFF22':'none'}}>
            🌟 All ({services.length})
          </button>
          {CATS.map((c,i)=>{
            const cnt=services.filter(s=>s.cat===c.id).length;
            const active=activeCat===c.id;
            return(
              <button key={c.id} onClick={()=>setActiveCat(active?null:c.id)} style={{
                background:active?`linear-gradient(135deg,${c.color}22,${c.color}0A)`:'#07091A',
                border:`1.5px solid ${active?c.color:c.color+'18'}`,
                borderRadius:12,padding:'8px 16px',color:active?c.color:'#2A3560',
                cursor:'pointer',fontSize:11.5,fontWeight:700,whiteSpace:'nowrap',
                transition:'all 0.25s',flexShrink:0,
                transform:active?'translateY(-2px)':'none',
                boxShadow:active?`0 4px 16px ${c.color}33`:'none',
                animation:`fadeUp 0.4s ${i*0.04}s ease both`}}>
                <span style={{display:'inline-block',animation:active?'floatUp 2.5s ease-in-out infinite':'none',marginRight:5}}>{c.icon}</span>
                {c.label} ({cnt})
              </button>
            );
          })}
          <button onClick={()=>setShowMap(!showMap)} style={{
            background:showMap?'#38BDF822':'#07091A',border:`1.5px solid ${showMap?'#38BDF8':'#1A2040'}`,
            borderRadius:12,padding:'8px 16px',color:showMap?'#38BDF8':'#2A3560',
            cursor:'pointer',fontSize:11.5,fontWeight:700,whiteSpace:'nowrap',transition:'all 0.2s',flexShrink:0}}>
            {showMap?'📋 List':'🗺️ Map'}
          </button>
        </div>
      </div>

      {/* MAIN CONTENT */}
      <main style={{maxWidth:1240,margin:'0 auto',padding:'22px 20px',position:'relative',zIndex:1}}>
        {page==='reviews'?(
          <div style={{animation:'fadeUp 0.4s ease'}}>
            <h2 style={{color:'#ECF0FF',fontFamily:"'Bebas Neue',sans-serif",fontSize:36,letterSpacing:1,marginBottom:4}}>COMMUNITY REVIEWS</h2>
            <p style={{color:'#2A3560',fontSize:13,marginBottom:24}}>Real experiences from real people across Pakistan</p>
            <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(280px,1fr))',gap:16}}>
              {(DB.get('reviews')||[]).map((r,i)=>(
                <div key={r.id} style={{background:'#07091A',border:'1px solid #1A2040',borderRadius:18,padding:20,
                  animation:`cardSlide 0.4s ease ${i*0.07}s both`}}>
                  <div style={{display:'flex',gap:10,marginBottom:12}}>
                    <span style={{fontSize:28,animation:'floatUp 3s ease-in-out infinite',display:'inline-block'}}>{r.avatar}</span>
                    <div>
                      <p style={{color:'#ECF0FF',margin:0,fontSize:13,fontWeight:700}}>{r.user}</p>
                      <p style={{color:'#2A3560',margin:'2px 0 0',fontSize:10}}>Used: {r.service}</p>
                    </div>
                  </div>
                  <div style={{marginBottom:8}}>
                    {[1,2,3,4,5].map(i=><span key={i} style={{color:i<=r.rating?'#F59E0B':'#1A2040',fontSize:14}}>★</span>)}
                  </div>
                  <p style={{color:'#4A5580',fontSize:12,lineHeight:1.6,margin:'0 0 10px',fontStyle:'italic'}}>"{r.text}"</p>
                  <p style={{color:'#1A2040',fontSize:10,margin:0}}>📅 {r.date}</p>
                </div>
              ))}
            </div>
          </div>
        ):showMap?(
          <div style={{display:'grid',gridTemplateColumns:'1fr 330px',gap:20,alignItems:'start'}}>
            <MapView services={services} activeCat={activeCat} selectedId={selPin?.id} onPinClick={s=>{setSelPin(s);setActiveCat(s.cat);}}/>
            <div>
              {selPin?(
                <div style={{background:'#07091A',border:`1px solid ${CMAP[selPin.cat]||'#5B3FFF'}44`,borderRadius:20,
                  padding:18,marginBottom:14,animation:'zoomIn 0.3s ease'}}>
                  <h4 style={{color:'#ECF0FF',margin:'0 0 6px',fontSize:15,fontWeight:700}}>{selPin.icon} {selPin.name}</h4>
                  <p style={{color:'#2A3560',fontSize:11,margin:'0 0 8px'}}>📍 {selPin.city} · {selPin.address}</p>
                  <div style={{display:'flex',gap:6,marginBottom:8}}>
                    <span style={{color:'#4A5580',fontSize:10}}>🌐 {selPin.lat}°N</span>
                    <span style={{color:'#4A5580',fontSize:10}}>📍 {selPin.lng}°E</span>
                  </div>
                  <p style={{color:'#4A5580',fontSize:11,lineHeight:1.5,margin:'0 0 10px'}}>{selPin.desc}</p>
                  <div style={{color:CMAP[selPin.cat]||'#5B3FFF',fontWeight:800,fontSize:15,marginBottom:10,
                    textShadow:`0 0 20px ${CMAP[selPin.cat]||'#5B3FFF'}55`}}>{selPin.price}</div>
                  <button onClick={()=>setBooking(selPin)} style={{width:'100%',
                    background:`linear-gradient(135deg,${CMAP[selPin.cat]||'#5B3FFF'},${CMAP[selPin.cat]||'#5B3FFF'}AA)`,
                    border:'none',borderRadius:10,padding:'10px',color:'#fff',fontWeight:700,cursor:'pointer',fontSize:13}}>
                    Book Now →
                  </button>
                </div>
              ):(
                <div style={{background:'#07091A',borderRadius:20,padding:'24px 18px',marginBottom:14,
                  textAlign:'center',border:'1px solid #1A2040'}}>
                  <div style={{fontSize:36,animation:'floatUp 2.5s ease-in-out infinite',display:'inline-block'}}>📍</div>
                  <p style={{color:'#2A3560',fontSize:12,marginTop:10,lineHeight:1.6}}>
                    Tap any colored pin on the map to see service details
                  </p>
                </div>
              )}
              <h3 style={{color:'#ECF0FF',fontSize:13,margin:'0 0 10px',fontWeight:700,fontFamily:"'Bebas Neue',sans-serif",letterSpacing:1}}>COVERED CITIES</h3>
              {COVERED.map(city=>(
                <div key={city} style={{background:'#07091A',border:'1px solid #1A2040',borderRadius:10,
                  padding:'8px 14px',marginBottom:6,display:'flex',justifyContent:'space-between',alignItems:'center'}}>
                  <span style={{color:'#ECF0FF',fontSize:12,fontWeight:500}}>📍 {city}</span>
                  <span style={{background:'#5B3FFF18',color:'#A78BFA',border:'1px solid #5B3FFF33',
                    borderRadius:20,padding:'2px 9px',fontSize:9,fontWeight:700,
                    boxShadow:'0 0 8px #5B3FFF33'}}>ACTIVE</span>
                </div>
              ))}
            </div>
          </div>
        ):(
          <div key={`${activeCat}-${q}-${cityF}-${tick}`} style={{animation:'fadeUp 0.35s ease'}}>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:16}}>
              <div>
                <p style={{color:'#2A3560',fontSize:13,margin:0,fontWeight:500}}>
                  Showing <strong style={{color:'#ECF0FF'}}>{filtered.length}</strong> results
                  {activeCat&&<> in <strong style={{color:CMAP[activeCat]}}>{CATS.find(c=>c.id===activeCat)?.label}</strong></>}
                  {cityF!=='All'&&<> · <strong style={{color:'#A78BFA'}}>{cityF}</strong></>}
                </p>
              </div>
              {!user&&(
                <button onClick={()=>{setAuthMode('register');setShowAuth(true);}} style={{
                  background:'#5B3FFF18',border:'1px solid #5B3FFF33',borderRadius:8,
                  padding:'6px 12px',color:'#A78BFA',cursor:'pointer',fontSize:11,fontWeight:600}}>
                  + List Your Service Free
                </button>
              )}
            </div>
            {filtered.length===0?(
              <div style={{textAlign:'center',padding:'70px 0'}}>
                <div style={{fontSize:56,animation:'floatUp 2.5s ease-in-out infinite',display:'inline-block'}}>🔍</div>
                <p style={{color:'#2A3560',fontSize:16,margin:'16px 0 6px',fontWeight:700}}>No results found</p>
                <p style={{color:'#1A2040',fontSize:12}}>Try a different city, category, or search term</p>
              </div>
            ):(
              <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(290px,1fr))',gap:16}}>
                {filtered.map((s,i)=>(
                  <ServiceCard key={s.id} s={s} delay={i}
                    onBook={setBooking}
                    sel={selPin?.id===s.id}
                    onSelect={s=>setSelPin(s)}/>
                ))}
              </div>
            )}
          </div>
        )}
      </main>

      {/* WHY US SECTION */}
      {page==='home'&&!activeCat&&!q&&(
        <section style={{background:'#06091A',borderTop:'1px solid #0F1328',padding:'44px 20px',marginTop:20}}>
          <div style={{maxWidth:1240,margin:'0 auto',textAlign:'center'}}>
            <h2 style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:40,letterSpacing:2,color:'#ECF0FF',marginBottom:6}}>
              WHY SHAHBAAZ?
            </h2>
            <p style={{color:'#2A3560',fontSize:13,marginBottom:32}}>Everything appabbottabad.com has — and 10x more</p>
            <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(200px,1fr))',gap:16}}>
              {[
                ['🛡️','#5B3FFF','Anti-Scam Codes','Every booking gets a unique verification code. No more imposters.'],
                ['📍','#38BDF8','Precise Map Pins','Every service is pinned to its exact GPS location on the map.'],
                ['🔐','#10B981','Real Login System','Actual accounts, not just phone lookup. Secure & persistent.'],
                ['💬','#F59E0B','In-App WhatsApp','Connect directly with providers via WhatsApp after booking.'],
                ['🆓','#EC4899','100% Free Forever','No PKR 200/month. No ads. No hidden fees. Ever.'],
                ['⭐','#A78BFA','Verified Providers','Admin-verified badge system for trusted service providers.'],
              ].map(([ic,c,title,desc])=>(
                <div key={title} style={{background:'#07091A',border:`1px solid ${c}22`,borderRadius:18,padding:20,
                  transition:'all 0.3s',cursor:'default'}}
                  onMouseEnter={e=>{e.currentTarget.style.transform='translateY(-4px)';e.currentTarget.style.borderColor=c+'55';e.currentTarget.style.boxShadow=`0 12px 30px ${c}22`}}
                  onMouseLeave={e=>{e.currentTarget.style.transform='none';e.currentTarget.style.borderColor=c+'22';e.currentTarget.style.boxShadow='none'}}>
                  <div style={{fontSize:32,marginBottom:12,animation:'floatUp 3s ease-in-out infinite',display:'inline-block',
                    filter:`drop-shadow(0 0 10px ${c}88)`}}>{ic}</div>
                  <h4 style={{color:'#ECF0FF',fontSize:13,fontWeight:700,margin:'0 0 6px'}}>{title}</h4>
                  <p style={{color:'#2A3560',fontSize:11,lineHeight:1.6,margin:0}}>{desc}</p>
                </div>
              ))}
            </div>
          </div>
        </section>
      )}

      {/* FOOTER */}
      <footer style={{borderTop:'1px solid #0F1328',padding:'28px 20px 20px',marginTop:0}}>
        <div style={{maxWidth:1240,margin:'0 auto',textAlign:'center'}}>
          <div style={{display:'flex',gap:12,justifyContent:'center',marginBottom:14,flexWrap:'wrap'}}>
            {CATS.map((c,i)=>(
              <span key={c.id} style={{fontSize:20,display:'inline-block',cursor:'pointer',
                animation:`floatUp ${2.2+i*0.25}s ease-in-out ${i*0.15}s infinite`,
                filter:`drop-shadow(0 0 8px ${c.color}88)`,transition:'transform 0.2s'}}
                onClick={()=>setActiveCat(c.id)}
                onMouseEnter={e=>e.currentTarget.style.transform='scale(1.3)'}
                onMouseLeave={e=>e.currentTarget.style.transform='scale(1)'}>{c.icon}</span>
            ))}
          </div>
          <p style={{color:'#1A2040',fontSize:11,margin:'0 0 5px',fontWeight:600}}>
            🦅 <strong style={{color:'#A78BFA',fontFamily:"'Bebas Neue',sans-serif",letterSpacing:1}}>SHAHBAAZ</strong>
            {' '}— Pakistan's Premium Service Super App · Abbottabad & Beyond
          </p>
          <p style={{color:'#0F1328',fontSize:10,margin:'0 0 16px'}}>Admin demo code: SHAHBAAZ2024 · Free forever</p>
          <div style={{borderTop:'1px solid #0F1328',paddingTop:16}}>
            <p style={{margin:0,color:'#2A3560',fontSize:12}}>
              Designed & Developed by{' '}
              <strong style={{color:'#A78BFA',fontFamily:"'Bebas Neue',sans-serif",fontSize:16,letterSpacing:1,
                textShadow:'0 0 16px #5B3FFF88'}}>ASHHAD</strong>
            </p>
            <p style={{margin:'6px 0 0',fontSize:12}}>
              <span style={{color:'#1A2040'}}>📞 </span>
              <a href='tel:03108762949' style={{color:'#38BDF8',textDecoration:'none',fontWeight:700,
                textShadow:'0 0 12px #38BDF866',letterSpacing:0.5}}>0310-8762949</a>
            </p>
          </div>
        </div>
      </footer>

      {/* MODALS */}
      {showAuth&&<AuthModal initMode={authMode} onSuccess={u=>{setUser(u);setShowAuth(false);}} onClose={()=>setShowAuth(false)}/>}
      {showAdd&&<AddServiceModal user={user} onDone={()=>refresh()} onClose={()=>{setShowAdd(false);refresh();}}/>}
      {booking&&<BookingModal s={booking} user={user} onClose={()=>setBooking(null)}/>}
      {showAdmin&&<AdminPanel onUpdate={refresh} onClose={()=>setShowAdmin(false)} user={user}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
</script>
</body>
</html>
